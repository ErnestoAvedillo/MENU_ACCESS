{% load static %}
<div class="form-section">
    <div class="form-group">
        <label for="longitud_inicial">Longitud inicial (mm):</label>
        <input type="number" 
                name="longitud_inicial" 
                id="longitud_inicial" 
                step="0.1" 
                min="0" 
                value="{{ request.POST.longitud_inicial }}"
                required>
        <label for="longitud_final">Longitud final (mm):</label>
        <input type="number" 
                name="longitud_final" 
                id="longitud_final" 
                step="0.1" 
                min="0" 
                value="{{ request.POST.longitud_final }}"
                required>
    </div>
    <div class="form-group">
        <label for="numero_ciclos">Número de ciclos:</label>
        <select name="numero_ciclos" id="numero_ciclos" required>
            <option value="1e3" {% if request.POST.numero_ciclos == '1e3' %}selected{% endif %}>1,000</option>
            <option value="1e4" {% if request.POST.numero_ciclos == '1e4' %}selected{% endif %}>10,000</option>
            <option value="1e5" {% if request.POST.numero_ciclos == '1e5' %}selected{% endif %}>100,000</option>
            <option value="1e6" {% if request.POST.numero_ciclos == '1e6' %}selected{% endif %}>1,000,000</option>
            <option value="1e7" {% if request.POST.numero_ciclos == '1e7' %}selected{% endif %}>10,000,000</option>
        </select>
    </div>
    <h3>🧮 Calcular</h3>
    <p>Complete los datos del muelle para obtener sus especificaciones técnicas completas.</p>
    <button type="submit" class="calculate-btn">🚀 Calcular Especificaciones</button>
</div>
